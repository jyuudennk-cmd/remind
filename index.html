<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>スマホ健康診断 予定登録</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZQW0KHN4MF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-ZQW0KHN4MF');
  </script>

  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f9f9f9; color: #333; }
    .container { background: #fff; padding: 25px 15px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
    h1 { font-size: 1.3em; color: #b71c1c; margin-bottom: 20px; }
    p { font-size: 0.9em; line-height: 1.6; text-align: left; }
    
    .present { background: #fff3e0; border: 2px solid #ff9800; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; color: #e65100; text-align: center; }
    .present span { font-size: 1.2em; display: block; margin-bottom: 5px; }
    
    .btn { display: block; width: 100%; padding: 15px; margin: 15px 0; font-size: 1em; font-weight: bold; color: #fff; background-color: #d32f2f; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
    .btn:active { background-color: #b71c1c; transform: scale(0.98); }
    
    .btn-map { background-color: #1976d2; margin-top: 30px;}
    .btn-map:active { background-color: #0d47a1; }
    
    .notice { font-size: 0.8em; color: #777; margin-top: 20px; text-align: center; }
  </style>
</head>
<body>

<div class="container">
  <h1>📱 スマホ健康診断</h1>
  
  <div class="present">
    <span>🎁 相談来店特典！</span>
    診断ご来店時に、素敵なノベルティをプレゼントいたします！
  </div>

  <p>ご購入ありがとうございます。定期的な「健康診断」をおすすめしています。<br><br>「無料クリーニング」や「バッテリーチェック」を実施中ですので、忘れないように以下のボタンからカレンダーにご登録ください。</p>
  
  <button class="btn" onclick="registerCalendar(3)">📅 3か月診断をカレンダーに登録</button>
  <button class="btn" onclick="registerCalendar(6)">📅 6か月診断をカレンダーに登録</button>

  <button class="btn btn-map" onclick="findNearbyStore()">📍 現在地から近くの店舗を探す</button>

  <p class="notice">※ボタンを押すとカレンダーやマップが開きます。</p>
</div>

<script>
  // GA4に明示的に page_view を送信
  gtag('event', 'page_view');

  // iOS判定を共通化
  const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

  // ▼ カレンダー登録処理 ▼
  function registerCalendar(months) {
    const today = new Date();
    // 今日から指定月数後の同じ日を計算
    const target = new Date(today.getFullYear(), today.getMonth() + months, today.getDate());

    const y = target.getFullYear();
    const m = String(target.getMonth() + 1).padStart(2, '0');
    const d = String(target.getDate()).padStart(2, '0');
    const startDate = `${y}${m}${d}`;

    // 終日イベント用（翌日を終了日に）
    const nextDay = new Date(target);
    nextDay.setDate(nextDay.getDate() + 1);
    const endDate = `${nextDay.getFullYear()}${String(nextDay.getMonth() + 1).padStart(2, '0')}${String(nextDay.getDate()).padStart(2, '0')}`;

    // カレンダーのタイトルと詳細テキスト（引換券URLを含む）
    const title = `【イオンモバイル】スマホ健康診断・無料メンテナンス（${months}か月目）`;
    const description = `ご購入から${months}か月が経過しました。\n\n毎日使うスマホ、見えない汚れが溜まっていませんか？\n店頭にて「無料クリーニング」や「バッテリーの劣化チェック」を実施中です！\n料金見直しや操作のお困りごともお気軽にご相談ください。\n\n🎫 ご来店特典・ノベルティ引換券はこちら\nhttps://jyuudennk-cmd.github.io/ticket/\n\nスマホカエドキプログラムのご相談も承ります。\nお近くのイオンモバイルはこちら\nhttps://aeonmobile.jp/shoplist/`;

    if (isIOS) {
      // iOS用 ICS生成（改行コードを \r\n に厳密化）
      const formattedDescription = description.replace(/\n/g, '\\n');
      const ics = 
        "BEGIN:VCALENDAR\r\n" +
        "VERSION:2.0\r\n" +
        "PRODID:-//QR Calendar//JP\r\n" +
        "BEGIN:VEVENT\r\n" +
        "DTSTART;VALUE=DATE:" + startDate + "\r\n" +
        "DTEND;VALUE=DATE:" + endDate + "\r\n" +
        "SUMMARY:" + title + "\r\n" +
        "DESCRIPTION:" + formattedDescription + "\r\n" +
        "END:VEVENT\r\n" +
        "END:VCALENDAR";

      // Blobと見えないリンクを使ってダウンロードを促す
      const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'schedule.ics';
      a.target = '_blank';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      window.URL.revokeObjectURL(url);

    } else {
      // Android/PC用 Googleカレンダー連携
      const calendarUrl =
        "https://calendar.google.com/calendar/render?action=TEMPLATE" +
        "&text=" + encodeURIComponent(title) +
        "&dates=" + startDate + "/" + endDate +
        "&details=" + encodeURIComponent(description);
      window.open(calendarUrl, '_blank');
    }

    // ボタンクリックをGA4で計測
    gtag('event', `click_calendar_${months}m`);
  }

  // ▼ 位置情報を取得して近くの店舗を探す処理 ▼
  function findNearbyStore() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        function(position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const keyword = encodeURIComponent('イオンモバイル');
          
          let mapUrl = "";
          if (isIOS) {
            // iOSなら標準のAppleマップを開く
            mapUrl = `https://maps.apple.com/?q=${keyword}&ll=${lat},${lng}`;
          } else {
            // Android/PCならGoogleマップを開く
            mapUrl = `https://www.google.com/maps?q=${keyword}&ll=${lat},${lng}`;
          }
          window.location.href = mapUrl;
        },
        function(error) {
          // 位置情報が拒否された場合などのフォールバック
          alert("位置情報が取得できなかったため、全国の店舗一覧ページを開きます。");
          window.open('https://aeonmobile.jp/shoplist/', '_blank');
        }
      );
    } else {
      // 位置情報非対応ブラウザのフォールバック
      window.open('https://aeonmobile.jp/shoplist/', '_blank');
    }
  }
</script>

</body>
</html>
